naftiko: 1.0.0-alpha2
info:
  label: Amazon Lookout for Equipment Workflow
  description: Unified workflow capability for Amazon Lookout for Equipment combining resource management and operations.
  tags:
  - Amazon Lookout for Equipment
  - AWS
  - Workflow
  created: '2026-04-19'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
capability:
  consumes:
  - type: http
    namespace: lookout-for-equipment
    baseUri: https://lookoutequipment.us-east-1.amazonaws.com
    description: Amazon Lookout for Equipment service.
    authentication:
      type: apikey
      key: Authorization
      value: '{{AWS_ACCESS_KEY_ID}}'
      placement: header
    resources:
    - name: datasets
      path: /datasets
      description: Equipment sensor dataset management
      operations:
      - name: createdataset
        method: POST
        description: Creates a container (dataset) for a collection of data being ingested for analysis.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: listdatasets
        method: GET
        description: Lists all datasets currently available in your account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: describedataset
        method: GET
        description: Provides a JSON containing the overall information about a specific dataset.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: lookout-for-equipment-api
    description: REST API for Amazon Lookout for Equipment workflow.
    resources: []
  - type: mcp
    port: 9090
    namespace: lookout-for-equipment-mcp
    transport: http
    description: MCP server for Amazon Lookout for Equipment.
    tools:
    - name: datasets-create-dataset
      description: Creates a container (dataset) for a collection of data being ingested for analysis.
      hints:
        readOnly: false
        idempotent: false
      call: lookout-for-equipment.createdataset
      outputParameters:
      - type: object
        mapping: $.
    - name: datasets-list-datasets
      description: Lists all datasets currently available in your account.
      hints:
        readOnly: true
        idempotent: true
      call: lookout-for-equipment.listdatasets
      outputParameters:
      - type: object
        mapping: $.
    - name: datasets-describe-dataset
      description: Provides a JSON containing the overall information about a specific dataset.
      hints:
        readOnly: true
        idempotent: true
      call: lookout-for-equipment.describedataset
      outputParameters:
      - type: object
        mapping: $.
